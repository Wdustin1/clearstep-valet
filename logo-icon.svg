<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" font-family="'Segoe UI', Helvetica Neue, Arial, sans-serif">

  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#1A6B35"/>

  <!-- House body -->
  <rect x="28" y="60" width="64" height="38" rx="3" fill="white"/>

  <!-- Roof -->
  <polygon points="60,18 98,64 22,64" fill="white"/>

  <!-- Door -->
  <rect x="46" y="72" width="28" height="26" rx="2.5" fill="#1A6B35"/>

  <!-- Door knob -->
  <circle cx="71" cy="86" r="2.5" fill="white"/>

  <!-- Chimney -->
  <rect x="76" y="32" width="10" height="20" rx="1.5" fill="white"/>

  <!-- Check badge -->
  <circle cx="96" cy="96" r="15" fill="white"/>
  <polyline points="88,96 93,103 104,88" stroke="#1A6B35" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- "VPS" monogram — small, bottom left of badge -->
  <text x="18" y="108" font-size="10" font-weight="700" fill="rgba(255,255,255,0.5)" letter-spacing="1">VPS</text>

</svg>
