<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" font-family="'Segoe UI', Helvetica Neue, Arial, sans-serif">

  <!-- ── Icon badge ── -->
  <!-- Outer circle -->
  <circle cx="60" cy="60" r="56" fill="#1A6B35"/>

  <!-- House body (white) -->
  <rect x="34" y="56" width="52" height="34" rx="2" fill="white"/>

  <!-- Roof (triangle) -->
  <polygon points="60,22 96,58 24,58" fill="white"/>

  <!-- Door -->
  <rect x="50" y="68" width="20" height="22" rx="2" fill="#1A6B35"/>

  <!-- Door knob -->
  <circle cx="68" cy="80" r="2" fill="white"/>

  <!-- Chimney -->
  <rect x="74" y="34" width="9" height="16" rx="1" fill="white"/>

  <!-- Small checkmark in bottom-right of badge (service complete) -->
  <circle cx="95" cy="95" r="14" fill="white"/>
  <polyline points="88,95 93,101 103,88" stroke="#1A6B35" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- ── Wordmark ── -->
  <text x="132" y="50"
        font-size="30"
        font-weight="700"
        fill="#1A6B35"
        letter-spacing="-0.5">Valet Property Solutions</text>

  <!-- Thin rule under main name -->
  <line x1="132" y1="58" x2="506" y2="58" stroke="#1A6B35" stroke-width="1.2" opacity="0.3"/>

  <!-- DBA line -->
  <text x="133" y="75"
        font-size="13"
        font-weight="400"
        fill="#555555"
        letter-spacing="0.3">All in 1 Realty LLC</text>

  <!-- Tagline -->
  <text x="133" y="93"
        font-size="10.5"
        font-weight="400"
        fill="#999999"
        letter-spacing="1.8">DOORSTEP VALET TRASH SERVICE  •  WICHITA, KS</text>

</svg>
